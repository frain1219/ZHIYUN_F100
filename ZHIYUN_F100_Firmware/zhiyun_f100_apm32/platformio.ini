; APM32F103CBT6 @ ZHIYUN F100 — Geehy SDK via src/geehy_sdk symlinks
; First time: chmod +x scripts/link_geehy_sdk.sh && ./scripts/link_geehy_sdk.sh

[env:apm32f103cb]
platform = ststm32
board = genericSTM32F103CB
framework =
upload_protocol = stlink
debug_tool = stlink
board_build.ldscript = ../../SDK/APM32F10x_SDK_V2.0.0/Libraries/Device/Geehy/APM32F10x/Source/gcc/apm32f103xb_flash.ld
build_unflags = -DSTM32F103xB -DSTM32F1
build_flags =
	-DAPM32F103xB
	-DUSE_STDPERIPH_DRIVER
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/CMSIS/Core/Include
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/Device/Geehy/APM32F10x/Include
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/APM32F10x_StdPeriphDriver/inc

; Optional: Renode/G2 GDB snapshots at first PD hit — StepBoot+IWDG run before PD block when period==1.
; Nominal OEM-cadence build remains env:apm32f103cb (default PHASE6_MAIN_STEP_IWDG_PERIOD_TICKS=100 in code).
[env:apm32f103cb_renode_g2]
extends = env:apm32f103cb
build_flags =
	-DAPM32F103xB
	-DUSE_STDPERIPH_DRIVER
	-DPHASE6_MAIN_STEP_IWDG_PERIOD_TICKS=1
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/CMSIS/Core/Include
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/Device/Geehy/APM32F10x/Include
	-I../../SDK/APM32F10x_SDK_V2.0.0/Libraries/APM32F10x_StdPeriphDriver/inc
