; STM32F407 USB CDC 最小测试固件
; 目的：验证 USB-C (PA11/PA12) 是否能被电脑识别为串口设备
; HSE = 8MHz，PLL → 168MHz，PLLQ=7 → USB 48MHz

[platformio]
default_envs = usb_test_cmsis_dap

[env:usb_test_cmsis_dap]
platform = ststm32
board = black_f407vg
framework = stm32cube
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
build_flags =
    -DHSE_VALUE=8000000
    -Iinclude
    -std=gnu11
board_upload.maximum_size = 1048576

[env:usb_test_stlink]
extends = env:usb_test_cmsis_dap
upload_protocol = stlink
debug_tool = stlink
