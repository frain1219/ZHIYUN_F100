; 射日科技 STM32F407V 核心板 + CH549/WCH-Link（CMSIS-DAP）
; **实物 MCU：STM32F407VGT6（1MB Flash）** — 默认环境已对齐 VGT6
; 资料：`射日科技STM32F407资料/`（例程 HSE 25 MHz → 168 MHz；例 1：**LED0 = PA0**）
; 原理图 PDF 名为 VET6，与例程一致；若你板载为 **VGT6**，以丝印为准并用默认环境即可
; 下载器：`CH549G下载器/`（WCH-Link DAP；固件恢复见 `烧录固件工具/LED灯闪烁解决方法.txt`）
;
; 板卡 **black_f407vg**：upload `protocols` 含 **cmsis-dap**；`board_upload.maximum_size` 纠正上游 JSON 误标

[platformio]
default_envs = sheritech_f407vg_cmsis_dap

[env:sheritech_f407vg_cmsis_dap]
platform = ststm32
board = black_f407vg
framework = stm32cube
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
build_flags =
	-DHSE_VALUE=25000000
	-Iinclude
	-std=gnu11
board_upload.maximum_size = 1048576

; 仅当实物为 **VET6**（512KB）时选用
[env:sheritech_f407ve_cmsis_dap]
extends = env:sheritech_f407vg_cmsis_dap
board = black_f407ve
board_upload.maximum_size = 524288

[env:sheritech_f407vg_stlink]
extends = env:sheritech_f407vg_cmsis_dap
upload_protocol = stlink
debug_tool = stlink
